<!doctype html>
<html lang="pt">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Feliz Aniversário Zahir!</title>
        <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/512/11851/11851744.png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <style>
            html {
                position: relative;
                height: 100%;
            }

            body {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                font-family: "Montserrat", sans-serif;
                margin: 0;
                background-color: #f8fafb;
                height: 100%;
                overflow: hidden;
                text-align: center;
                padding: 1rem;
            }

            .message {
                font-size: clamp(1.5rem, 8vw, 3.5rem);
                font-weight: 300;
                opacity: 0;
                transition: opacity 0.8s ease-in;
                z-index: 10;
            }

            .message.visible {
                opacity: 1;
            }

            .confetti-container {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 5;
            }

            .confetti-emoji {
                position: absolute;
                font-size: clamp(1.5rem, 6vw, 3rem);
                animation: fall linear forwards;
                opacity: 0;
            }

            @keyframes fall {
                0% {
                    transform: translateY(-10%) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(110vh) rotate(720deg);
                    opacity: 0.6;
                }
            }

            @keyframes shake {
                0%   { transform: translateX(0); }
                15%  { transform: translateX(-8px); }
                30%  { transform: translateX(8px); }
                45%  { transform: translateX(-8px); }
                60%  { transform: translateX(8px); }
                75%  { transform: translateX(-5px); }
                90%  { transform: translateX(5px); }
                100% { transform: translateX(0); }
            }

            .shake {
                animation: shake 0.6s ease-in-out;
            }
        </style>
    </head>

    <body>
        <div class="confetti-container" id="confettiContainer"></div>

        <div class="message" id="message">
            🎉 Feliz aniversário Zahir!! :D
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script>
            function isAndroid() {
                return /Android/i.test(navigator.userAgent);
            }

            function launchConfetti() {
                var container = document.getElementById("confettiContainer");
                var emojis = ["🎉", "🎊", "🥳", "🎈", "✨"];
                var count = 40;

                for (var i = 0; i < count; i++) {
                    (function(index) {
                        var delay = Math.random() * 2000;
                        setTimeout(function() {
                            var el = document.createElement("span");
                            el.className = "confetti-emoji";
                            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                            el.style.left = Math.random() * 100 + "%";
                            el.style.top = "-5%";
                            var duration = 2.5 + Math.random() * 2;
                            el.style.animationDuration = duration + "s";
                            el.style.animationDelay = "0s";
                            container.appendChild(el);
                            setTimeout(function() {
                                el.remove();
                            }, (duration + 0.5) * 1000);
                        }, delay);
                    })(i);
                }
            }

            function shakeScreen() {
                document.body.classList.add("shake");
                document.body.addEventListener("animationend", function handler() {
                    document.body.classList.remove("shake");
                    document.body.removeEventListener("animationend", handler);
                });
            }

            window.addEventListener("load", function() {
                if (isAndroid()) {
                    if (navigator.vibrate) {
                        navigator.vibrate([100, 50, 100, 50, 100, 50, 100]);
                    }
                    shakeScreen();
                }

                launchConfetti();

                setTimeout(function() {
                    document.getElementById("message").classList.add("visible");
                }, 300);
            });
        </script>
    </body>

</html>
